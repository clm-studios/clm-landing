<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citlali & Lop Monster Studios — Coming Soon</title>
  <meta name="description" content="Citlali & Lop Monster Studios — where the Star meets the Moon Rabbit. Coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --deep: #0a0a1a;
      --night: #12122a;
      --star-gold: #f4c842;
      --moon-silver: #d4dff7;
      --glow-purple: #7c5cbf;
      --soft-white: #e8eaf6;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 30% 20%, #1a1440 0%, var(--deep) 60%, #050510 100%);
      color: var(--soft-white);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* --- Starfield --- */
    .starfield {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .starfield .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--dur) ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0%   { opacity: var(--min-o, 0.15); transform: scale(1); }
      100% { opacity: var(--max-o, 0.8);  transform: scale(1.3); }
    }

    /* --- Main content --- */
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 640px;
    }

    /* --- Emblem: star + moon-rabbit --- */
    .emblem {
      margin-bottom: 2.5rem;
      position: relative;
      display: inline-block;
    }

    .emblem svg {
      width: 160px;
      height: 160px;
      filter: drop-shadow(0 0 24px rgba(244, 200, 66, 0.35))
              drop-shadow(0 0 48px rgba(124, 92, 191, 0.25));
    }

    /* --- Typography --- */
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.25;
      margin-bottom: 0.5rem;
    }

    .brand .citlali {
      color: var(--star-gold);
    }

    .brand .amp {
      color: var(--glow-purple);
      margin: 0 0.15em;
    }

    .brand .lopmon {
      color: var(--moon-silver);
    }

    .studios {
      display: block;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--glow-purple);
      margin-top: 0.25rem;
    }

    .tagline {
      margin-top: 1.75rem;
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      font-weight: 300;
      color: rgba(232, 234, 246, 0.7);
      line-height: 1.6;
    }

    .tagline em {
      font-style: normal;
      color: var(--star-gold);
    }

    .tagline strong {
      font-weight: 400;
      color: var(--moon-silver);
    }

    /* --- Coming Soon badge --- */
    .badge {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 0.6rem 2rem;
      border: 1px solid rgba(124, 92, 191, 0.4);
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--glow-purple);
      background: rgba(124, 92, 191, 0.08);
      animation: pulse-border 3s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%, 100% { border-color: rgba(124, 92, 191, 0.25); box-shadow: 0 0 0 0 rgba(124, 92, 191, 0); }
      50%      { border-color: rgba(124, 92, 191, 0.6);  box-shadow: 0 0 20px 0 rgba(124, 92, 191, 0.1); }
    }

    /* --- Footer --- */
    .footer {
      position: fixed;
      bottom: 1.5rem;
      z-index: 1;
      font-size: 0.72rem;
      color: rgba(232, 234, 246, 0.25);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

  <!-- Starfield (generated by JS) -->
  <div class="starfield" id="starfield"></div>

  <div class="content">
    <!-- Emblem: 5-pointed star + crescent moon with rabbit ears -->
    <div class="emblem">
      <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        <!-- Star (Citlali) -->
        <polygon
          points="50,18 56,38 77,38 60,50 66,70 50,58 34,70 40,50 23,38 44,38"
          fill="var(--star-gold)"
          opacity="0.95"
        />
        <!-- Soft glow behind star -->
        <circle cx="50" cy="44" r="18" fill="var(--star-gold)" opacity="0.12" />

        <!-- Crescent Moon (Lopmon) -->
        <g transform="translate(88, 62)">
          <!-- Outer moon circle -->
          <circle cx="24" cy="24" r="28" fill="var(--moon-silver)" opacity="0.9" />
          <!-- Inner cut-out to create crescent -->
          <circle cx="34" cy="18" r="24" fill="var(--deep)" />

          <!-- Rabbit ear — left -->
          <ellipse cx="6" cy="-14" rx="5" ry="18"
            fill="var(--moon-silver)" opacity="0.85"
            transform="rotate(-15, 6, -14)" />
          <ellipse cx="6" cy="-14" rx="2.5" ry="13"
            fill="var(--glow-purple)" opacity="0.3"
            transform="rotate(-15, 6, -14)" />

          <!-- Rabbit ear — right -->
          <ellipse cx="22" cy="-20" rx="5" ry="18"
            fill="var(--moon-silver)" opacity="0.85"
            transform="rotate(10, 22, -20)" />
          <ellipse cx="22" cy="-20" rx="2.5" ry="13"
            fill="var(--glow-purple)" opacity="0.3"
            transform="rotate(10, 22, -20)" />
        </g>

        <!-- Tiny accent stars -->
        <circle cx="130" cy="20" r="1.5" fill="var(--star-gold)" opacity="0.6" />
        <circle cx="20"  cy="95" r="1"   fill="var(--star-gold)" opacity="0.4" />
        <circle cx="145" cy="110" r="1.2" fill="var(--moon-silver)" opacity="0.5" />
        <circle cx="35"  cy="135" r="0.8" fill="var(--star-gold)" opacity="0.35" />
      </svg>
    </div>

    <h1 class="brand">
      <span class="citlali">Citlali</span><span class="amp">&</span><span class="lopmon">Lop Monster</span>
      <span class="studios">Studios</span>
    </h1>

    <p class="tagline">
      Where the <em>Star</em> meets the <strong>Moon Rabbit</strong>.<br>
      Something new is taking shape.
    </p>

    <div class="badge">Coming Soon</div>
  </div>

  <div class="footer">© 2026 Citlali & Lop Monster Studios</div>

  <script>
    // Generate starfield
    const field = document.getElementById('starfield');
    const count = 120;

    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      s.classList.add('star');
      const size = Math.random() * 2.5 + 0.5;
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.setProperty('--dur', (Math.random() * 4 + 2) + 's');
      s.style.setProperty('--min-o', (Math.random() * 0.2).toFixed(2));
      s.style.setProperty('--max-o', (Math.random() * 0.5 + 0.4).toFixed(2));
      s.style.animationDelay = (Math.random() * 5) + 's';
      field.appendChild(s);
    }
  </script>
</body>
</html>
